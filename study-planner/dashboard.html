<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>📘 Study Planner</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="addtask.html">Add Task</a>
        <a href="manage-task.html">Manage Tasks</a>
        <a href="schedule.html">Schedule</a>
        <a href="progress.html">Progress</a>
        <a href="logout.html">Logout</a>
    </div>

    <!-- MAIN -->
    <div class="main-content">

        <h2>Dashboard</h2>

        <!-- CARDS -->
        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Tasks</h3>
                <p>12</p>
            </div>

            <div class="card">
                <h3>Pending</h3>
                <p>5</p>
            </div>

            <div class="card">
                <h3>Completed</h3>
                <p>7</p>
            </div>

            <div class="card">
                <h3>Schedule</h3>
                <p>4</p>
            </div>
        </div>

        <!-- GRID -->
        <div class="grid-2">

            <!-- TASK LIST -->
            <div class="card">
                <h3>Manage Tasks</h3>

                <table class="task-table">
                    <tr>
                        <th>Title</th>
                        <th>Deadline</th>
                        <th>Status</th>
                    </tr>

                    <tr>
                        <td>Math Assignment</td>
                        <td>2026-05-20</td>
                        <td><span class="badge pending">Pending</span></td>
                    </tr>

                    <tr>
                        <td>Web Dev</td>
                        <td>2026-05-25</td>
                        <td><span class="badge completed">Completed</span></td>
                    </tr>
                </table>
            </div>

            <!-- ADD TASK -->
            <div class="card">
                <h3>Add New Task</h3>

                <form class="task-form">
                    <input type="text" placeholder="Task Title">
                    <input type="date">
                    
                    <select>
                        <option>Pending</option>
                        <option>Completed</option>
                    </select>

                    <button>Save Task</button>
                </form>
            </div>

        </div>

    </div>

</div>

</body>
<footer class="footer">
    <p>© 2026 Study Planner. All rights reserved.</p>
</footer>

</html>
