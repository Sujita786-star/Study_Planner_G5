<!DOCTYPE html>
<html>
<head>
    <title>Progress Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Study Planner</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="schedule.html">Schedule</a>
        <a href="progress.html">Progress</a>
        <a href="goodbye.html" class="btn-primary">Logout</a>
    </div>
</div>

<!-- PROGRESS SECTION -->
<div class="progress-container">

    <!-- LEFT CARD -->
    <div class="progress-card">
        <h3>Overall Progress</h3>
        <div class="progress-percent">75%</div>
        <p>You have completed most of your study tasks this week.</p>

        <div class="stats-box">

            <div class="stat-item">
                <h4>15</h4>
                <p>Completed</p>
            </div>

            <div class="stat-item">
                <h4>5</h4>
                <p>Pending</p>
            </div>

            <div class="stat-item">
                <h4>20</h4>
                <p>Total Tasks</p>
            </div>

        </div>
    </div>

    <!-- RIGHT CARD -->
    <div class="progress-card">
        <h3>Weekly Activity</h3>

        <div class="chart-box">
            <p style="text-align:center; padding-top:100px; color:#666;">
                Progress Chart Area
            </p>
        </div>

    </div>

</div>

</body>

<footer class="footer">
    <p>© 2026 Study Planner. All rights reserved.</p>
</footer>

</html>
