<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyFlow – Forgot Password</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">
  <div class="auth-bg">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>
  </div>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-icon">🔐</div>
      <h1 class="brand-name">Reset Password</h1>
      <p class="brand-tagline">Recover your StudyFlow account</p>
    </div>

    <form class="auth-card" action="reset-sent.html" method="get">
      <h2 class="auth-title">Forgot password?</h2>
      <p class="auth-sub">Enter your email address and we will show the next reset step.</p>

      <div class="form-group">
        <label class="form-label" for="resetEmail">Email address</label>
        <input type="email" id="resetEmail" name="email" class="form-input" placeholder="you@example.com" required />
      </div>

      <button class="btn-primary full-width" type="submit">Continue</button>
      <p class="auth-switch">Remembered your password? <a href="index.html">Back to Sign In</a></p>
    </form>
  </div>
</body>
</html>
