<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyFlow – Logged Out</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">
  <div class="auth-bg">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>
  </div>
  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-icon">👋</div>
      <h1 class="brand-name">Goodbye!</h1>
      <p class="brand-tagline">You have been logged out successfully.</p>
    </div>
    <div class="auth-card" style="text-align:center">
      <h2 class="auth-title">Session ended</h2>
      <p class="auth-sub">Come back anytime to continue planning your study.</p>
      <a class="btn-primary full-width" style="display:block" href="index.html">Back to Sign In</a>
    </div>
  </div>
</body>
</html>
