<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyFlow – Sign In</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
</head>
<body class="auth-page">
  <div class="auth-bg">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>
  </div>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-icon">📚</div>
      <h1 class="brand-name">StudyFlow</h1>
      <p class="brand-tagline">Plan. Focus. Achieve.</p>
    </div>

    <form class="auth-card" action="dashboard.html" method="get">
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-sub">Sign in to your study space</p>

      <div class="form-group">
        <label class="form-label" for="loginEmail">Email address</label>
        <input type="email" id="loginEmail" name="email" class="form-input" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="password" class="form-input" placeholder="••••••••" required minlength="6" />
      </div>

      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberMe" name="remember" />
          <span>Remember me</span>
        </label>
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
      </div>

      <button class="btn-primary full-width" type="submit">Sign In</button>
      <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>
    </form>
  </div>
</body>
</html>
